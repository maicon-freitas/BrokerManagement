<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover" />
    <meta name="theme-color" content="#faf9f6" />
    <script>
      (function () {
        try {
          var k = 'broker_theme';
          var t = localStorage.getItem(k);
          if (t === 'dark') document.documentElement.classList.add('dark');
          else if (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
            document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Agenda Imóvel · Gestão imobiliária</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
